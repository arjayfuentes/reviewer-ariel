<div class="min-h-screen px-6 py-12 bg-[#0d0f14] text-slate-200">
  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="flex items-start gap-5 mb-7 pb-2 border-b border-[#252a38]">
      <div
        class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0"
        style="
          background: linear-gradient(135deg, #1e3a5f, #0f2040);
          box-shadow: 0 8px 24px rgba(30, 58, 95, 0.4);
        "
      >
        🔄
      </div>
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight leading-tight mb-1">
          SDLC & <span style="color: #60a5fa">Agile</span>
        </h1>
        <p class="text-slate-500 text-sm font-normal">
          Software Development Life Cycle — ceremonies, frameworks, and best practices
        </p>
      </div>
    </div>

    <!-- Sections -->
    <div class="flex flex-col gap-5">
      <div
        *ngFor="let section of sections"
        class="bg-[#13161e] border border-[#252a38] rounded-2xl overflow-hidden"
      >
        <!-- Section Header -->
        <div
          class="flex items-center justify-between px-6 py-4 cursor-pointer border-b border-[#252a38]"
          [ngStyle]="{ background: getSectionGradient(section.color) }"
        >
          <div class="flex items-center gap-3">
            <span class="text-xl">{{ section.icon }}</span>
            <span class="font-semibold text-base tracking-tight">{{ section.title }}</span>
          </div>
          <i
            class="pi text-sm"
            [ngClass]="section.expanded ? 'pi-chevron-up' : 'pi-chevron-down'"
          ></i>
        </div>

        <!-- Items -->
        <div class="flex flex-col divide-y divide-[#1e2230]">
          <div
            *ngFor="let item of section.items; let i = index"
            class="px-6 py-6 flex flex-col gap-3"
          >
            <!-- Title -->
            <div class="flex items-center gap-3">
              <div
                class="w-8 h-8 rounded-lg flex items-center justify-center font-mono text-sm font-bold flex-shrink-0"
                [ngStyle]="{
                  background: getAccentBg(section.color),
                  color: getAccentColor(section.color),
                }"
              >
                {{ (i + 1).toString().padStart(2, '0') }}
              </div>
              <span class="font-semibold text-base text-slate-100">{{ item.title }}</span>
            </div>

            <!-- Description -->
            <p class="text-sm text-slate-400 leading-relaxed pl-11">
              {{ item.description }}
            </p>

            <!-- Detail -->
            <div *ngIf="item.detail" class="pl-11">
              <div
                class="rounded-xl px-5 py-4 flex flex-col gap-2"
                style="background: rgba(255, 255, 255, 0.03); border: 1px solid #1e2230"
              >
                <div class="flex items-center gap-2 mb-1">
                  <i class="pi pi-book text-xs" style="color: #64748b"></i>
                  <span class="text-xs uppercase tracking-wider font-mono" style="color: #64748b">
                    In depth
                  </span>
                </div>
                <p
                  *ngFor="let line of item.detail!.trim().split('\n')"
                  class="text-sm leading-relaxed m-0"
                  style="color: #94a3b8"
                >
                  {{ line }}
                </p>
              </div>
            </div>

            <!-- Tip -->
            <div *ngIf="item.tip" class="pl-11">
              <div
                class="rounded-xl px-5 py-3 flex items-start gap-3"
                style="
                  background: rgba(251, 191, 36, 0.06);
                  border: 1px solid rgba(251, 191, 36, 0.2);
                "
              >
                <span class="text-base flex-shrink-0">💡</span>
                <p class="text-sm leading-relaxed m-0" style="color: #fbbf24">
                  {{ item.tip }}
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

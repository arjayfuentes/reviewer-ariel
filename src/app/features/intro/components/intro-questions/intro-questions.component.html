<div class="min-h-screen px-6 py-12 bg-[#0d0f14] text-slate-200">
  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="flex items-start gap-5 mb-7 pb-2 border-b border-[#252a38]">
      <div
        class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0"
        style="
          background: linear-gradient(135deg, #134e4a, #062e2b);
          box-shadow: 0 8px 24px rgba(19, 78, 74, 0.4);
        "
      >
        💬
      </div>
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight leading-tight mb-1">
          Personal <span style="color: #2dd4bf">Questions</span>
        </h1>
        <p class="text-slate-500 text-sm font-normal">
          Conversation starters — English & Nederlands
        </p>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-[#13161e] border border-[#252a38] rounded-2xl overflow-hidden">
      <!-- Table header -->
      <div
        style="
          display: grid;
          grid-template-columns: 1fr 1fr;
          background: linear-gradient(135deg, #134e4a, #062e2b);
          border-bottom: 1px solid #252a38;
        "
      >
        <div class="px-6 py-3 flex items-center gap-2">
          <span>🇬🇧</span>
          <span class="text-xs uppercase tracking-wider font-mono text-slate-300">English</span>
        </div>
        <div class="px-6 py-3 flex items-center gap-2" style="border-left: 1px solid #1e2230">
          <span>🇳🇱</span>
          <span class="text-xs uppercase tracking-wider font-mono text-slate-300">Nederlands</span>
        </div>
      </div>

      <!-- Table rows -->
      <div
        *ngFor="let question of questions; let i = index"
        style="display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #1e2230"
        [style.background]="i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.02)'"
      >
        <!-- English -->
        <div class="px-6 py-4" style="display: flex; align-items: flex-start; gap: 0.75rem">
          <div
            style="
              width: 24px;
              height: 24px;
              border-radius: 6px;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 0.75rem;
              font-weight: 700;
              font-family: monospace;
              flex-shrink: 0;
              margin-top: 2px;
              background: rgba(45, 212, 191, 0.12);
              color: #2dd4bf;
            "
          >
            {{ i + 1 }}
          </div>
          <span style="font-size: 0.875rem; line-height: 1.6; color: #e2e8f0">{{
            question.english
          }}</span>
        </div>

        <!-- Dutch -->
        <div class="px-6 py-4" style="border-left: 1px solid #1e2230">
          <span style="font-size: 0.875rem; line-height: 1.6; color: #94a3b8">{{
            question.dutch
          }}</span>
        </div>
      </div>
    </div>
  </div>
</div>

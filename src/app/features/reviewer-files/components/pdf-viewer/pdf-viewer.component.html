<div class="viewer-wrapper">
  <div class="stored-list" *ngIf="storedPdfs.length">
    <p class="stored-label">Reviewer PDFs</p>
    <div class="pdf-chips">
      <button
        *ngFor="let pdf of storedPdfs"
        class="pdf-chip"
        [class.active]="fileName === pdf"
        (click)="loadStoredPdf(pdf)"
      >
        <i class="pi pi-file-pdf"></i> {{ pdf }}
      </button>
    </div>
  </div>

  <div *ngIf="errorMessage" class="error-msg">
    <i class="pi pi-exclamation-triangle"></i> {{ errorMessage }}
  </div>

  <div *ngIf="isLoading" class="loading">
    <i class="pi pi-spin pi-spinner"></i> Rendering PDF...
  </div>

  <div #pdfContainer class="pdf-container"></div>

  <div *ngIf="!totalPages && !isLoading && !errorMessage" class="empty-state">
    <i class="pi pi-file-pdf"></i>
    <p>Select a saved PDF or upload your own</p>
  </div>
</div>

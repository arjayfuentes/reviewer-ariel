<div class="viewer-wrapper">
  <div class="stored-list" *ngIf="storedPdfs.length">
    <p class="stored-label">Saved PDFs</p>
    <div class="pdf-chips">
      <button
        *ngFor="let pdf of storedPdfs"
        class="pdf-chip"
        [class.active]="fileName === pdf"
        (click)="loadStoredPdf(pdf)"
      >
        <i class="pi pi-file-pdf"></i> {{ pdf }}
      </button>
    </div>
  </div>

  <div class="divider">or upload your own</div>

  <div class="upload-bar">
    <label for="pdf-upload" class="upload-btn"> <i class="pi pi-upload"></i> Upload PDF </label>
    <input
      id="pdf-upload"
      type="file"
      accept=".pdf"
      (change)="onFileSelected($event)"
      style="display: none"
    />
    <span class="file-name">{{ fileName || 'No file selected' }}</span>
    <span *ngIf="totalPages > 0" class="page-count">
      {{ totalPages }} page{{ totalPages > 1 ? 's' : '' }}
    </span>
  </div>

  <div *ngIf="errorMessage" class="error-msg">
    <i class="pi pi-exclamation-triangle"></i> {{ errorMessage }}
  </div>

  <div *ngIf="isLoading" class="loading">
    <i class="pi pi-spin pi-spinner"></i> Rendering PDF...
  </div>

  <div #pdfContainer class="pdf-container"></div>

  <div *ngIf="!totalPages && !isLoading && !errorMessage" class="empty-state">
    <i class="pi pi-file-pdf"></i>
    <p>Select a saved PDF or upload your own</p>
  </div>
</div>

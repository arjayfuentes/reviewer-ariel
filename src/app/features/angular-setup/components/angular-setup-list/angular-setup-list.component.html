    <p-accordion-panel value="0">

      <p-accordion-content>
        <app-angular-plugins-vscode></app-angular-plugins-vscode>
      </p-accordion-content>
    </p-accordion-panel>
    <p-accordion-panel value="1">
      <p-accordion-header>VS Code ES Lint</p-accordion-header>

    <p-accordion-panel value="2">

      <p-accordion-content>
